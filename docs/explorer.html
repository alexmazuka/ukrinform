<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Explorer — CensorZero</title>
<style>
  :root {
    --navy: #1a365d; --gold: #f6ad55; --white: #fff;
    --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
    --gray-400: #94a3b8; --gray-600: #475569; --gray-800: #1e293b;
    --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
    --font: 'Inter', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--gray-50); color: var(--gray-800); }

  .top-bar {
    background: var(--navy); color: white; padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .top-bar a { color: var(--gold); text-decoration: none; font-size: 16px; font-weight: 700; }
  .top-bar span { font-size: 13px; color: rgba(255,255,255,0.6); }
  .back-link { font-size: 13px; color: rgba(255,255,255,0.7); text-decoration: none; }
  .back-link:hover { color: white; }

  .controls {
    background: white; border-bottom: 1px solid var(--gray-200);
    padding: 16px 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    position: sticky; top: 0; z-index: 10;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--gray-200);
    border-radius: 6px; font-size: 14px; font-family: var(--font); outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--navy); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--gray-400); font-size: 16px; }
  select {
    padding: 8px 12px; border: 1px solid var(--gray-200); border-radius: 6px;
    font-size: 13px; font-family: var(--font); background: white; outline: none; cursor: pointer;
  }
  select:focus { border-color: var(--navy); }
  .count-badge {
    background: var(--navy); color: white; font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 12px; white-space: nowrap;
  }
  .btn-export {
    padding: 8px 14px; background: var(--gray-100); border: 1px solid var(--gray-200);
    border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--gray-600);
    cursor: pointer; font-family: var(--font);
  }
  .btn-export:hover { background: var(--gray-200); }

  /* LEGEND */
  .legend {
    padding: 8px 24px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200);
    display: flex; gap: 20px; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--gray-600); }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.parket { background: #fef3c7; color: #92400e; }
  .badge.balance { background: #fee2e2; color: #991b1b; }
  .badge.official { background: #dbeafe; color: #1e40af; }

  /* VIRTUAL TABLE */
  .table-container { overflow: auto; height: calc(100vh - 140px); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--navy); color: white; padding: 10px 12px;
    text-align: left; font-weight: 600; white-space: nowrap;
    position: sticky; top: 0; cursor: pointer; user-select: none;
  }
  thead th:hover { background: #2a4a7f; }
  thead th .sort-arrow { margin-left: 4px; opacity: 0.5; }
  thead th.sorted .sort-arrow { opacity: 1; }
  tbody tr { border-bottom: 1px solid var(--gray-100); transition: background 0.1s; }
  tbody tr:hover { background: #f0f7ff; }
  tbody td { padding: 8px 12px; vertical-align: top; }
  .td-date { color: var(--gray-600); white-space: nowrap; font-size: 12px; }
  .td-title a { color: var(--navy); text-decoration: none; font-weight: 500; line-height: 1.4; }
  .td-title a:hover { text-decoration: underline; }
  .td-title .excerpt { font-size: 11px; color: var(--gray-400); margin-top: 2px; line-height: 1.4; }
  .td-rubric { font-size: 11px; color: var(--gray-600); white-space: nowrap; }
  .td-sources { text-align: center; font-weight: 600; }
  .td-sources.zero { color: var(--red); }
  .td-sources.one { color: #d97706; }
  .td-sources.multi { color: #16a34a; }
  .td-flags { white-space: nowrap; }
  .td-period { font-size: 11px; }
  .period-1 { color: #1e40af; font-weight: 600; }
  .period-2 { color: #166534; font-weight: 600; }

  /* PAGINATION */
  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 16px; background: white; border-top: 1px solid var(--gray-200);
  }
  .page-btn {
    padding: 6px 12px; border: 1px solid var(--gray-200); border-radius: 6px;
    background: white; font-size: 13px; cursor: pointer; font-family: var(--font);
  }
  .page-btn:hover:not(:disabled) { background: var(--gray-100); }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .page-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
  .page-info { font-size: 13px; color: var(--gray-600); }

  .loading-msg { text-align: center; padding: 60px; color: var(--gray-400); font-size: 15px; }
  .no-results { text-align: center; padding: 60px; color: var(--gray-400); font-size: 15px; }
</style>
</head>
<body>

<div class="top-bar">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="index.html">CENSOR<span style="color:rgba(255,255,255,0.7);font-weight:300">ZERO</span></a>
    <span>Message Explorer</span>
  </div>
  <a href="index.html" class="back-link">← Назад до дашборду</a>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Пошук за заголовком, рубрикою, словом..." autocomplete="off">
  </div>
  <select id="filter-period">
    <option value="">Обидва періоди</option>
    <option value="matsuka">Період 1 — Мацука (2023-2024)</option>
    <option value="reinclusion">Період 2 — Після відходу (2025)</option>
  </select>
  <select id="filter-rubric">
    <option value="">Всі рубрики</option>
    <option value="ato">АТО / Оборона</option>
    <option value="polytics">Політика</option>
    <option value="economy">Економіка</option>
    <option value="society">Суспільство</option>
    <option value="regions">Регіони</option>
    <option value="tymchasovo-okupovani">Окуповані території</option>
    <option value="vidbudova">Відбудова</option>
  </select>
  <select id="filter-type">
    <option value="">Всі типи</option>
    <option value="parket">🟡 Ймовірний паркет</option>
    <option value="balance">🔴 Ризик дисбалансу</option>
    <option value="official">🔵 Офіційне джерело</option>
    <option value="clean">🟢 Без зауважень</option>
  </select>
  <select id="sort-by">
    <option value="date-desc">Дата ↓ (нові)</option>
    <option value="date-asc">Дата ↑ (старі)</option>
    <option value="sources-asc">Джерел ↑ (менше)</option>
    <option value="sources-desc">Джерел ↓ (більше)</option>
  </select>
  <span class="count-badge" id="count-badge">...</span>
  <button class="btn-export" onclick="exportCSV()">⬇ CSV</button>
</div>

<div class="legend">
  <div class="legend-item"><span class="badge parket">П</span> Ймовірний паркет</div>
  <div class="legend-item"><span class="badge balance">Б</span> Ризик дисбалансу</div>
  <div class="legend-item"><span class="badge official">О</span> Офіційне джерело</div>
  <div class="legend-item" style="margin-left:auto;color:var(--gray-400)">Натисніть на заголовок — відкриється оригінальна стаття</div>
</div>

<div class="table-container">
  <table id="explorer-table">
    <thead>
      <tr>
        <th style="width:90px">Дата</th>
        <th>Заголовок / Excerpt</th>
        <th style="width:100px">Рубрика</th>
        <th style="width:60px" title="Кількість джерел">Дж.</th>
        <th style="width:80px">Мітки</th>
        <th style="width:70px">Період</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="6"><div class="loading-msg">⏳ Завантаження даних...</div></td></tr>
    </tbody>
  </table>
</div>

<div class="pagination" id="pagination"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const PAGE_SIZE = 100;
const RUBRIC_LABELS = {
  'ato': 'АТО', 'polytics': 'Політика', 'economy': 'Економіка',
  'society': 'Суспільство', 'regions': 'Регіони',
  'tymchasovo-okupovani': 'Окуповані', 'vidbudova': 'Відбудова'
};

let allData = [];
let filtered = [];
let currentPage = 1;

// ============================================================
// LOAD DATA
// ============================================================
async function loadData() {
  try {
    // Try to load from data file
    const resp = await fetch('explorer_data.json');
    if (!resp.ok) throw new Error('data not ready');
    allData = await resp.json();
  } catch(e) {
    // Fallback: show message
    document.getElementById('table-body').innerHTML =
      `<tr><td colspan="6"><div class="loading-msg">
        ⏳ Дані ще обробляються. Повний Message Explorer буде доступний після завершення аудиту.<br>
        <small style="margin-top:8px;display:block">Поточний статус: <strong id="audit-status">перевіряємо...</strong></small>
      </div></td></tr>`;
    return;
  }
  applyFilters();
}

// ============================================================
// FILTER + SORT
// ============================================================
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const period = document.getElementById('filter-period').value;
  const rubric = document.getElementById('filter-rubric').value;
  const type = document.getElementById('filter-type').value;
  const sort = document.getElementById('sort-by').value;

  filtered = allData.filter(row => {
    if (q && !row.t?.toLowerCase().includes(q) &&
            !row.r?.toLowerCase().includes(q) &&
            !row.ex?.toLowerCase().includes(q)) return false;
    if (period === 'matsuka' && !row.d?.startsWith('202') ) return false;
    if (period === 'matsuka' && row.d >= '2025') return false;
    if (period === 'reinclusion' && row.d < '2025') return false;
    if (rubric && row.r !== rubric) return false;
    if (type === 'parket' && !row.pk) return false;
    if (type === 'balance' && !row.br) return false;
    if (type === 'official' && !row.of) return false;
    if (type === 'clean' && (row.pk || row.br)) return false;
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    if (sort === 'date-desc') return b.d?.localeCompare(a.d);
    if (sort === 'date-asc') return a.d?.localeCompare(b.d);
    if (sort === 'sources-asc') return (a.sc ?? 99) - (b.sc ?? 99);
    if (sort === 'sources-desc') return (b.sc ?? -1) - (a.sc ?? -1);
    return 0;
  });

  currentPage = 1;
  document.getElementById('count-badge').textContent =
    `${filtered.length.toLocaleString('uk')} статей`;
  renderTable();
  renderPagination();
}

// ============================================================
// RENDER
// ============================================================
function renderTable() {
  const tbody = document.getElementById('table-body');
  const start = (currentPage - 1) * PAGE_SIZE;
  const rows = filtered.slice(start, start + PAGE_SIZE);

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="no-results">Нічого не знайдено</div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(row => {
    const flags = [
      row.pk ? '<span class="badge parket">П</span>' : '',
      row.br ? '<span class="badge balance">Б</span>' : '',
      row.of ? '<span class="badge official">О</span>' : '',
    ].filter(Boolean).join(' ');

    const sc = row.sc ?? -1;
    const scClass = sc <= 0 ? 'zero' : sc === 1 ? 'one' : 'multi';
    const scText = sc < 0 ? '?' : sc;

    const period = row.d < '2025'
      ? '<span class="period-1">П1</span>'
      : '<span class="period-2">П2</span>';

    const rubricLabel = RUBRIC_LABELS[row.r] || row.r || '';
    const title = row.t || row.u?.split('/').pop()?.replace(/-/g,' ') || '—';
    const excerpt = row.ex ? `<div class="excerpt">${row.ex}</div>` : '';

    return `<tr>
      <td class="td-date">${row.d || ''}</td>
      <td class="td-title">
        <a href="${row.u}" target="_blank" rel="noopener">${escHtml(title)}</a>
        ${excerpt}
      </td>
      <td class="td-rubric">${rubricLabel}</td>
      <td class="td-sources ${scClass}">${scText}</td>
      <td class="td-flags">${flags}</td>
      <td class="td-period">${period}</td>
    </tr>`;
  }).join('');
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }

  let html = '';
  html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Попередня</button>`;

  // Show page numbers around current
  const pages = [];
  if (total <= 7) {
    for (let i = 1; i <= total; i++) pages.push(i);
  } else {
    pages.push(1);
    if (currentPage > 3) pages.push('...');
    for (let i = Math.max(2, currentPage-1); i <= Math.min(total-1, currentPage+1); i++) pages.push(i);
    if (currentPage < total - 2) pages.push('...');
    pages.push(total);
  }

  for (const p of pages) {
    if (p === '...') {
      html += `<span class="page-info">…</span>`;
    } else {
      html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    }
  }

  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>Наступна ›</button>`;
  html += `<span class="page-info">${((currentPage-1)*PAGE_SIZE+1).toLocaleString('uk')}–${Math.min(currentPage*PAGE_SIZE, filtered.length).toLocaleString('uk')} з ${filtered.length.toLocaleString('uk')}</span>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderTable();
  renderPagination();
  document.querySelector('.table-container').scrollTop = 0;
}

// ============================================================
// EXPORT
// ============================================================
function exportCSV() {
  const headers = ['url','title','date','rubric','period','sources','parket','balance_risk','official','excerpt'];
  const rows = filtered.map(r => [
    r.u, `"${(r.t||'').replace(/"/g,'""')}"`, r.d, r.r,
    r.d < '2025' ? 'before_exclusion_matsuka' : 'before_reinclusion_after_departure',
    r.sc, r.pk?1:0, r.br?1:0, r.of?1:0,
    `"${(r.ex||'').replace(/"/g,'""').replace(/\n/g,' ')}"`
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `censorzero_export_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// EVENTS
// ============================================================
let searchTimer;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 200);
});
['filter-period','filter-rubric','filter-type','sort-by'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});

// Init
loadData();
</script>
</body>
</html>
